version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multicam-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - BACKEND_ENV=dev
      - DB_URL=sqlite:////data/app.db
    ports:
      - "18080:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multicam-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "13000:80"
    depends_on:
      - backend

  # 可选：RTSP 模拟服务（将来需要时再启用）
