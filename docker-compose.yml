version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multicam-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - BACKEND_ENV=dev
      - DB_URL=sqlite:////data/app.db
      - YOLO_GENDER_MODEL_PATH=yolov8n-gender-classification.pt
      - YOLO_FACE_AGE_MODEL_PATH=yolo11n-face-age.pt
      - YOLO_FACE_AGE_DEBUG=1
      # NVIDIA GPU (需要宿主机与 Docker 支持 NVIDIA Container Toolkit)
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    ports:
      - "18080:8000"
    # 兼容旧版 docker-compose：使用 nvidia runtime
    # 若你的环境已是 Docker Compose v2，可改用 `gpus: all`
    runtime: nvidia

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multicam-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "13000:80"
    depends_on:
      - backend

  # 可选：RTSP 模拟服务（将来需要时再启用）
  # rtsp-sim:
  #   image: bluenviron/mediamtx:latest
  #   container_name: rtsp-sim
  #   ports:
  #     - "8554:8554"
  #   volumes:
  #     - ./rtsp-config:/config


